<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack Clone - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'slack-purple': '#3f0e40',
                        'slack-blue': '#1264a3',
                        'slack-hover': '#4a154b',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white dark:bg-[#1a1d21] text-[#1d1c1d] dark:text-[#d1d2d3] transition-colors duration-300">

    <nav id="navbar"
        class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-[5%] py-4 transition-all duration-500">
        <div class="flex items-center gap-8">
            <a href="index.html" class="flex items-center">
                <img src="assets/logo-slack.svg" alt="Slack Logo"
                    class="h-6 md:h-8 dark:invert transition-all duration-300">
            </a>
    
            <ul class="hidden md:flex gap-6 font-bold text-sm">
                <li><a href="html/solutions.html" class="hover:text-slack-blue transition-colors">Solutions</a></li>
                <li><a href="html/enterprise.html" class="hover:text-slack-blue transition-colors">Enterprise</a></li>
                <li><a href="html/pricing.html" class="hover:text-slack-blue transition-colors">Pricing</a></li>
            </ul>
        </div>
    
        <div class="flex items-center gap-4">
            <a href="html/contact-sales.html"
                class="hidden lg:block font-bold text-xs tracking-widest border-2 border-slack-purple text-slack-purple px-4 py-2 rounded hover:bg-slack-purple hover:text-white dark:border-white dark:text-white dark:hover:bg-white dark:hover:text-slack-purple transition-all duration-300">
                REQUEST A DEMO
            </a>
    
            <button onclick="toggleTheme()"
                class="bg-slack-purple text-white dark:bg-white dark:text-slack-purple px-6 py-2 rounded font-black text-xs uppercase shadow-md active:scale-95 transition-all duration-300">
                Theme
            </button>
        </div>
    </nav>

    <header class="pt-32 px-[5%] flex flex-col items-center text-center">
        <h1 class="text-5xl md:text-7xl font-black mb-6">Made for people. <span
                class="text-slack-purple dark:text-purple-400">Built for productivity.</span></h1>
        <p class="text-xl max-w-2xl mb-8 font-medium">Connect the right people, find anything you need and finally get
            more done together.</p>
        <button class="bg-slack-purple text-white px-8 py-4 rounded font-bold text-lg hover:bg-slack-hover">GET
            STARTED</button>
    </header>

    <script src="js/main.js"></script>
</body>

</html>
